<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WTI MORNING BRIEF</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

:root {

  --bg:      #12141a;

  --surface: #1a1d25;

  --card:    #20242e;

  --inset:   #161920;

  --hdr:     #0d0f15;

  --border:  #282c3a;

  --border2: #343a50;

  --green:   #34d875;

  --red:     #f87171;

  --text:    #e8ecf4;

  --text2:   #c4cce0;

  --dim:     #6a7490;

  --ylw:     #fbbf24;

  --ylw2:    #fde68a;

  --ylw3:    #fef3c7;

  --gold:    #f59e0b;

  --ylw-dim: #7a560e;

  --mono:'DM Mono',monospace;

  --sans:'Noto Sans KR',sans-serif;

  --disp:'Bebas Neue',sans-serif;

}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}


 

/* ══ HEADER ══ */

.hdr{

  position:sticky;top:0;z-index:100;

  background:var(--hdr);border-bottom:2px solid var(--gold);

  display:flex;align-items:center;justify-content:space-between;

  padding:0 48px;height:72px;

  box-shadow:0 2px 28px rgba(0,0,0,.7);

}

.hdr-left{display:flex;align-items:baseline;gap:20px;}

.hdr-logo{font-family:var(--disp);font-size:38px;letter-spacing:.14em;color:var(--ylw);}

.hdr-sub{font-family:var(--mono);font-size:12px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;}

.hdr-right{display:flex;align-items:center;gap:14px;}

.hdr-clock{font-family:var(--mono);font-size:14px;color:var(--ylw2);}

.btn-new{

  background:var(--gold);color:#140e00;border:none;border-radius:5px;

  padding:10px 26px;font-family:var(--mono);font-size:13px;

  font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .15s;

}

.btn-new:hover{background:var(--ylw);}

.btn-refresh{

  background:transparent;border:1px solid var(--border2);color:var(--dim);

  padding:9px 18px;border-radius:5px;font-family:var(--mono);font-size:12px;

  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;

}

.btn-refresh:hover{border-color:var(--ylw);color:var(--ylw);}


 

/* ══ 검색바 ══ */

.search-bar{

  background:var(--hdr);border-bottom:1px solid var(--border);

  padding:14px 48px;display:flex;align-items:center;gap:16px;

}

.sb-label{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ylw);white-space:nowrap;}

.sb-input{

  background:var(--card);border:1px solid var(--border2);border-radius:5px;

  color:var(--ylw2);font-family:var(--mono);font-size:14px;

  padding:8px 14px;outline:none;transition:border-color .15s;width:175px;

}

.sb-input:focus{border-color:var(--gold);}

.sb-btn{

  background:transparent;border:1px solid var(--border2);color:var(--dim);

  padding:8px 16px;border-radius:5px;font-family:var(--mono);font-size:11px;

  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;

}

.sb-btn:hover{border-color:var(--ylw);color:var(--ylw);}

.sb-result{font-family:var(--mono);font-size:12px;color:var(--dim);margin-left:auto;}


 

/* ══ 레이아웃 ══ */

.wrap{max-width:1500px;margin:0 auto;padding:44px 48px 100px;}

.empty{text-align:center;padding:100px 0;font-family:var(--mono);font-size:13px;letter-spacing:.12em;color:var(--dim);}

.empty .e-icon{font-size:52px;margin-bottom:20px;opacity:.18;}

.loading{text-align:center;padding:70px 0;font-family:var(--mono);font-size:13px;color:var(--dim);}

.spinner{width:34px;height:34px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}

@keyframes spin{to{transform:rotate(360deg)}}

.date-group{margin-bottom:48px;}


 

/* ══ CARD ══ */

.brief{

  background:var(--surface);border:1px solid var(--border);

  border-radius:12px;overflow:hidden;

  box-shadow:0 6px 36px rgba(0,0,0,.5);

  animation:fadeUp .3s ease both;

}

.brief.dir-dn{border-left:6px solid var(--red);}

.brief.dir-up{border-left:6px solid var(--ylw);}

.brief.dir-flt{border-left:6px solid var(--dim);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.brief.sub-source{margin-top:8px;border-radius:8px;border-left:6px solid var(--ylw-dim);}


 

/* ══ 가격 헤더 ══ */

.brief-header{

  display:flex;align-items:stretch;

  background:var(--card);border-bottom:1px solid var(--border);

  min-height:180px;

}

.bh-date{

  padding:30px 36px;border-right:1px solid var(--border);

  display:flex;flex-direction:column;justify-content:center;gap:10px;

  min-width:220px;flex-shrink:0;

}

.bh-date-val{font-family:var(--mono);font-size:28px;color:var(--ylw2);font-weight:700;letter-spacing:.04em;}

.bh-date-cont{font-family:var(--mono);font-size:14px;color:var(--dim);}

.bh-price{

  display:flex;align-items:center;gap:12px;

  padding:24px 40px;flex-shrink:0;

}

.bh-arrow{font-family:var(--disp);font-size:56px;line-height:1;flex-shrink:0;}

.bh-arrow.up{color:var(--ylw);}

.bh-arrow.dn{color:var(--red);}

.bh-arrow.flt{color:var(--dim);}

.bh-price-block{display:flex;flex-direction:column;gap:4px;}

.bh-price-label{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ylw);opacity:.8;}

.bh-val{font-family:var(--disp);font-size:160px;line-height:.88;letter-spacing:.01em;}

.bh-val.up{color:var(--ylw);}

.bh-val.dn{color:var(--red);}

.bh-val.flt{color:var(--text);}

.bh-unit{font-family:var(--mono);font-size:16px;color:var(--dim);align-self:flex-end;padding-bottom:16px;line-height:1.6;}

.bh-delta{

  display:flex;flex-direction:column;justify-content:center;gap:16px;

  padding:24px 36px;border-left:1px solid var(--border);flex-shrink:0;

}

.bh-d-row{display:flex;align-items:center;gap:14px;}

.bh-d-label{font-family:var(--mono);font-size:12px;letter-spacing:.12em;color:var(--dim);width:36px;text-transform:uppercase;}

.bh-d-val{font-family:var(--mono);font-size:44px;font-weight:700;line-height:1;}

.bh-d-val.up{color:var(--ylw);}

.bh-d-val.dn{color:var(--red);}

.bh-dir{

  padding:24px 32px;border-left:1px solid var(--border);

  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;flex-shrink:0;

}

.bh-dir-badge{

  font-family:var(--sans);font-size:26px;font-weight:800;

  padding:12px 32px;border-radius:36px;white-space:nowrap;

}

.bh-dir-badge.up{background:rgba(251,191,36,.15);color:var(--ylw);border:1px solid rgba(251,191,36,.4);}

.bh-dir-badge.dn{background:rgba(248,113,113,.18);color:var(--red);border:1px solid rgba(248,113,113,.4);}

.bh-dir-badge.flt{background:rgba(232,236,244,.1);color:var(--text);border:1px solid rgba(232,236,244,.3);}

.bh-dir-label{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;}

.bh-actions{margin-left:auto;display:flex;flex-direction:column;border-left:1px solid var(--border);min-width:90px;align-self:stretch;}

.act-btn{

  flex:1;display:flex;align-items:center;justify-content:center;

  background:transparent;border:none;cursor:pointer;

  font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--dim);

  padding:0 16px;transition:all .15s;text-transform:uppercase;

  border-bottom:1px solid var(--border);

}

.act-btn:last-child{border-bottom:none;}

.act-btn.edit:hover{background:rgba(251,191,36,.08);color:var(--ylw);}

.act-btn.del:hover{background:rgba(248,113,113,.08);color:var(--red);}


 

/* ══ 섹션 공통 라벨 ══ */

.sec-label{

  font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;

  color:var(--ylw);margin-bottom:12px;

  display:inline-flex;align-items:center;gap:8px;

  background:rgba(245,158,11,.1);border:1px solid var(--ylw-dim);

  border-radius:5px;padding:5px 14px;font-weight:700;

}

.sec-label.dim{color:var(--dim);background:rgba(106,116,144,.1);border-color:var(--border2);}

.sec-label.blue{color:#60a5fa;background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.25);}


 

/* ══ 코멘터리 (가격 바로 아래) ══ */

.brief-commentary{

  padding:26px 32px;border-bottom:1px solid var(--border);

  background:var(--inset);border-left:6px solid var(--gold);

}

.co-text{

  font-size:22px;line-height:1.88;

  color:var(--ylw3);white-space:pre-wrap;font-weight:500;

}


 

/* ══ 변동요인 리스트 (원문) ══ */

.brief-factors{

  padding:26px 32px;border-bottom:1px solid var(--border);

}

.factor-list{

  list-style:none;display:flex;flex-direction:column;gap:10px;margin-top:4px;

}

.factor-list li{

  display:flex;align-items:flex-start;gap:12px;

  font-size:17px;line-height:1.7;color:#ffffff;font-weight:400;

}

.factor-list li::before{

  content:'▸';color:var(--gold);font-size:14px;flex-shrink:0;margin-top:3px;

}


 

/* ══ 추가정보 ══ */

.brief-counter{

  padding:22px 32px;border-bottom:1px solid var(--border);

  background:rgba(22,25,32,.6);

}

.counter-text{

  font-size:16px;line-height:1.82;color:#d4dae8;

  font-style:italic;font-weight:400;

}

.counter-text::before{content:'"';font-size:20px;line-height:0;vertical-align:-4px;margin-right:3px;color:var(--dim);}

.counter-text::after{content:'"';font-size:20px;line-height:0;vertical-align:-4px;margin-left:3px;color:var(--dim);}


 

/* ══ 전망 ══ */

.brief-outlook{

  padding:22px 32px;border-bottom:1px solid var(--border);

  background:rgba(96,165,250,.04);border-left:6px solid #3b82f6;

}

.outlook-text{

  font-size:18px;line-height:1.78;color:#93c5fd;font-weight:500;

}


 

/* ══ COPY ROW ══ */

.brief-copy{

  padding:14px 28px;display:flex;align-items:center;justify-content:flex-end;gap:10px;

  background:var(--card);

}

.cp-btn{

  font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;

  background:transparent;border:1px solid var(--border2);color:var(--dim);

  padding:9px 20px;border-radius:5px;cursor:pointer;transition:all .15s;

}

.cp-btn:hover{border-color:var(--ylw);color:var(--ylw);}

.cp-btn.img:hover{border-color:var(--green);color:var(--green);}

.cp-btn.ok{border-color:var(--green);color:var(--green);}


 

/* ══ 아코디언 ══ */

.source-header{

  display:flex;align-items:center;justify-content:space-between;

  padding:14px 28px;background:var(--card);border-bottom:1px solid var(--border);

}

.src-badge{

  font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;

  color:var(--ylw);background:rgba(245,158,11,.1);border:1px solid var(--ylw-dim);

  padding:5px 14px;border-radius:4px;

}

.src-actions{display:flex;gap:8px;}

.src-act-btn{

  background:transparent;border:1px solid var(--border2);color:var(--dim);

  padding:5px 12px;border-radius:4px;font-family:var(--mono);font-size:11px;

  text-transform:uppercase;cursor:pointer;transition:all .15s;

}

.src-act-btn.edit:hover{border-color:var(--ylw);color:var(--ylw);}

.src-act-btn.del:hover{border-color:var(--red);color:var(--red);}

.accordion-toggle{

  width:100%;padding:14px 28px;

  background:var(--inset);border:none;border-top:1px solid var(--border);

  display:flex;align-items:center;justify-content:space-between;

  cursor:pointer;transition:background .15s;

}

.accordion-toggle:hover{background:rgba(245,158,11,.05);}

.at-label{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ylw);}

.at-arrow{font-size:13px;color:var(--ylw);transition:transform .22s;}

.at-arrow.open{transform:rotate(180deg);}

.accordion-body{display:none;}

.accordion-body.open{display:block;}


 

/* ══ MODAL ══ */

#overlay{

  position:fixed;inset:0;z-index:200;

  background:rgba(0,0,0,.82);backdrop-filter:blur(10px);

  display:none;align-items:center;justify-content:center;

}

#overlay.open{display:flex;}

#modal{

  width:860px;max-height:92vh;

  background:var(--surface);border:1px solid var(--border2);border-radius:14px;

  display:flex;flex-direction:column;overflow:hidden;

  box-shadow:0 32px 90px rgba(0,0,0,.75);animation:mIn .22s ease;

}

@keyframes mIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}

.mhdr{

  display:flex;align-items:center;justify-content:space-between;

  padding:18px 30px;border-bottom:1px solid var(--border);

  background:var(--hdr);flex-shrink:0;

}

.mhdr-title{font-family:var(--mono);font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--ylw);}

.mhdr-close{

  background:transparent;border:1px solid var(--border2);color:var(--dim);

  width:34px;height:34px;border-radius:4px;cursor:pointer;font-size:17px;

  display:flex;align-items:center;justify-content:center;transition:all .15s;

}

.mhdr-close:hover{border-color:var(--red);color:var(--red);}

.mbody{

  flex:1;overflow-y:auto;padding:26px 30px;

  display:flex;flex-direction:column;gap:18px;background:var(--bg);

}

.m-sec{

  background:var(--surface);border:1px solid var(--border);border-radius:9px;

  padding:18px 22px;display:flex;flex-direction:column;gap:12px;

}

.m-sec-label{

  font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;

  color:var(--ylw);display:flex;align-items:center;gap:8px;

}

.m-sec-label::after{content:'';flex:1;height:1px;background:var(--ylw-dim);opacity:.35;}

.m-sec-label.blue{color:#60a5fa;}

.m-sec-label.blue::after{background:#3b82f6;opacity:.3;}

.m-sec-label.dim2{color:var(--dim);}

.m-sec-label.dim2::after{background:var(--border2);opacity:.6;}

#news-ta{

  width:100%;height:180px;resize:vertical;

  background:var(--card);border:1px solid var(--border2);border-radius:6px;

  color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.72;

  padding:13px 15px;outline:none;transition:border-color .15s;

}

#news-ta:focus{border-color:var(--gold);}

#news-ta::placeholder{color:var(--dim);font-size:13px;}

#parsed-wrap{display:none;}

.pf-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

.pf-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.pfield{display:flex;flex-direction:column;gap:6px;}

.pfield label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ylw-dim);}

.pfield input,.pfield select,.pfield textarea{

  background:var(--card);border:1px solid var(--border2);border-radius:6px;

  color:var(--text);font-family:var(--mono);font-size:14px;

  padding:10px 12px;outline:none;width:100%;transition:border-color .15s;

}

.pfield input:focus,.pfield select:focus,.pfield textarea:focus{border-color:var(--gold);}

.pfield input.hi{color:var(--ylw2);font-weight:700;border-color:var(--ylw-dim);background:rgba(245,158,11,.05);}

.pfield textarea{resize:vertical;min-height:70px;font-family:var(--sans);font-size:13px;line-height:1.65;}

.pfield textarea.blue-ta{border-color:rgba(96,165,250,.3);}

.pfield textarea.blue-ta:focus{border-color:#60a5fa;}

.parse-status{

  font-family:var(--mono);font-size:12px;padding:10px 14px;

  border-radius:6px;margin-top:4px;display:none;

}

.parse-status.ok{background:rgba(52,216,117,.08);border:1px solid rgba(52,216,117,.3);color:var(--green);}

.parse-status.warn{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);color:var(--ylw);}

.parse-status.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);color:var(--red);}

.mftr{

  flex-shrink:0;padding:16px 30px;border-top:1px solid var(--border);

  display:flex;gap:10px;background:var(--surface);

}

.mf-btn{

  padding:12px 20px;border:none;border-radius:6px;cursor:pointer;

  font-family:var(--mono);font-size:13px;letter-spacing:.1em;

  text-transform:uppercase;font-weight:700;transition:all .15s;

}

.mf-parse{flex:1;background:var(--card);color:var(--ylw);border:1px solid var(--ylw-dim);}

.mf-parse:hover{background:rgba(245,158,11,.1);border-color:var(--ylw);}

.mf-save{flex:2;background:var(--gold);color:#140e00;display:none;}

.mf-save:hover{background:var(--ylw);}

.mf-close{

  background:transparent;border:1px solid var(--border2);color:var(--dim);

  padding:12px 18px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:13px;transition:all .15s;

}

.mf-close:hover{border-color:var(--red);color:var(--red);}


 

/* ══ TOAST ══ */

#toast{

  position:fixed;bottom:30px;right:30px;z-index:9999;

  padding:14px 22px;border-radius:8px;font-family:var(--mono);font-size:14px;

  font-weight:500;color:#fff;opacity:0;transform:translateY(10px);

  transition:all .24s;pointer-events:none;max-width:360px;

  box-shadow:0 8px 30px rgba(0,0,0,.6);

}

#toast.show{opacity:1;transform:translateY(0);}

#toast.ok{background:#166534;}

#toast.err{background:#991b1b;}

#toast.inf{background:#1e3a5f;}


 

::-webkit-scrollbar{width:5px;}

::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}


 

/* ══ MOBILE ══ */

@media (max-width:480px){

  .hdr{padding:10px 16px;height:auto;flex-wrap:wrap;gap:6px;}

  .hdr-sub{display:none;}

  .hdr-logo{font-size:26px;}

  .hdr-right{gap:8px;}

  .hdr-clock{font-size:12px;}

  .btn-new{padding:8px 14px;font-size:11px;}

  .btn-refresh{padding:7px 12px;font-size:11px;}

  .search-bar{padding:10px 16px;flex-wrap:wrap;gap:8px;}

  .sb-result{margin-left:0;width:100%;font-size:11px;}

  .sb-input{width:140px;font-size:13px;}

  .wrap{padding:16px 10px 60px;}

  .date-group{margin-bottom:28px;}

  .brief-header{flex-direction:column;min-height:unset;}

  .bh-date{padding:12px 16px;border-right:none;border-bottom:1px solid var(--border);min-width:unset;flex-direction:row;align-items:center;justify-content:space-between;}

  .bh-date-val{font-size:17px;}

  .bh-price{padding:14px 16px;gap:8px;}

  .bh-val{font-size:78px;}

  .bh-arrow{font-size:34px;}

  .bh-delta{flex-direction:row;padding:10px 16px;border-left:none;border-top:1px solid var(--border);gap:20px;}

  .bh-d-val{font-size:26px;}

  .bh-dir{padding:10px 16px;border-left:none;border-top:1px solid var(--border);flex-direction:row;justify-content:space-between;}

  .bh-dir-badge{font-size:18px;padding:8px 20px;}

  .bh-actions{flex-direction:row;border-left:none;border-top:1px solid var(--border);min-width:unset;}

  .act-btn{border-bottom:none;border-right:1px solid var(--border);}

  .act-btn:last-child{border-right:none;}

  .brief-commentary,.brief-factors,.brief-counter,.brief-outlook{padding:16px;}

  .co-text{font-size:15px;}

  .factor-list li{font-size:14px;}

  .outlook-text{font-size:15px;}

  #modal{width:95vw;max-height:96vh;}

  .mbody{padding:14px 12px;}

  .pf-grid{grid-template-columns:1fr 1fr;}

  .pf-grid-2{grid-template-columns:1fr;}

  .mftr{padding:12px 14px;gap:8px;}

  .mf-btn{padding:11px 14px;font-size:12px;}

  #toast{bottom:16px;right:12px;left:12px;max-width:unset;}

}

</style>

</head>

<body>


 

<header class="hdr">

  <div class="hdr-left">

    <div class="hdr-logo">WTI BRIEF</div>

    <div class="hdr-sub">Crude Oil · Morning Monitor</div>

  </div>

  <div class="hdr-right">

    <div class="hdr-clock" id="clock"></div>

    <button class="btn-refresh" onclick="loadData()">↻ REFRESH</button>

    <button class="btn-new" onclick="openModal()">+ NEW ENTRY</button>

  </div>

</header>


 

<div class="search-bar">

  <span class="sb-label">◈ 날짜 검색</span>

  <input type="date" class="sb-input" id="sb-date">

  <button class="sb-btn" onclick="doSearch()">🔍 검색</button>

  <button class="sb-btn" id="sb-clear" onclick="clearSearch()" style="display:none">✕ 전체보기</button>

  <span class="sb-result" id="sb-result"></span>

</div>


 

<div class="wrap">

  <div class="loading" id="loading" style="display:none"><div class="spinner"></div>데이터 불러오는 중...</div>

  <div class="empty" id="empty" style="display:none">

    <div class="e-icon">◈</div>

    <div style="color:var(--ylw2)">NO ENTRIES YET</div>

    <div style="margin-top:10px;font-size:12px;color:var(--dim)">

      <strong style="color:var(--ylw)">+ NEW ENTRY</strong> 버튼으로 첫 번째 브리프를 추가하세요

    </div>

  </div>

  <div id="cards"></div>

</div>


 

<!-- MODAL -->

<div id="overlay">

  <div id="modal">

    <div class="mhdr">

      <div class="mhdr-title" id="modal-title">◈ NEW WTI ENTRY</div>

      <button class="mhdr-close" onclick="closeModal()">✕</button>

    </div>

    <div class="mbody">


 

      <!-- 01 뉴스 입력 -->

      <div class="m-sec">

        <div class="m-sec-label">01 · 브리핑 텍스트</div>

        <textarea id="news-ta" placeholder="1) 가격

* WTI M-1: $65.19/b (▲ $2.86/b, +4.59%) → 상승(급등)

2) 가격 변동 요인 한줄

* 미국-이란 핵협상 교착발...

3) 변동요인 구체 리스트

* 요인1

* 요인2

4) 결론 및 전망

* 협상 진전 전까지 변동성 확대...

5) 추가정보

* EIA 재고, 달러, OPEC 관련 참고사항..."></textarea>

        <div class="parse-status" id="parse-st"></div>

      </div>


 

      <!-- 02 수치 -->

      <div class="m-sec" id="parsed-wrap">

        <div class="m-sec-label">02 · 수치 확인 · 수정</div>

        <div class="pf-grid" style="margin-bottom:12px">

          <div class="pfield"><label>WTI 종가 ($/bbl) *</label>

            <input type="number" id="f-wti" step="0.01" placeholder="65.19" class="hi"></div>

          <div class="pfield"><label>전일比 $</label>

            <input type="number" id="f-abs" step="0.01" placeholder="2.86" oninput="autoPct()"></div>

          <div class="pfield"><label>변동률 %</label>

            <input type="number" id="f-pct" step="0.01" placeholder="4.59"></div>

        </div>

        <div class="pf-grid-2">

          <div class="pfield"><label>기준일 *</label>

            <input type="date" id="f-date"></div>

          <div class="pfield"><label>월물 *</label>

            <select id="f-cont">

              <option value="Mar">3월물 (Mar)</option>

              <option value="Apr">4월물 (Apr)</option>

              <option value="May">5월물 (May)</option>

              <option value="Jun">6월물 (Jun)</option>

              <option value="Jul">7월물 (Jul)</option>

            </select></div>

        </div>


 

        <!-- 코멘터리 -->

        <div class="m-sec-label" style="margin-top:8px">코멘터리 · 변동요인 한줄</div>

        <div class="pfield">

          <textarea id="f-commentary" placeholder="2) 가격 변동 요인 한줄 자동 추출"></textarea>

        </div>


 

        <!-- 변동요인 리스트 -->

        <div class="m-sec-label">변동요인 구체 리스트</div>

        <div class="pfield">

          <textarea id="f-factors" rows="6" placeholder="3) 변동요인 구체 리스트 자동 추출 (줄바꿈 구분)"></textarea>

        </div>


 

        <!-- 추가정보 -->

        <div class="m-sec-label dim2">추가정보 (선택)</div>

        <div class="pfield">

          <textarea id="f-counter" placeholder="5) 추가정보 자동 추출 또는 직접 입력 (선택사항)"></textarea>

        </div>


 

        <!-- 전망 -->

        <div class="m-sec-label blue">결론 및 전망</div>

        <div class="pfield">

          <textarea id="f-outlook" class="blue-ta" placeholder="4) 결론 및 전망 자동 추출"></textarea>

        </div>

        <div class="pfield" style="margin-top:8px">

          <label>원본 링크 (선택)</label>

          <input type="url" id="f-link" placeholder="https://...">

        </div>

      </div>


 

    </div>

    <div class="mftr">

      <button class="mf-btn mf-parse" onclick="doParse()">🔍 파싱</button>

      <button class="mf-btn mf-save" id="btn-save" onclick="doSave()">▶ 구글시트 저장</button>

      <button class="mf-close" onclick="closeModal()">닫기</button>

    </div>

  </div>

</div>


 

<div id="toast"></div>


 

<script>

const GAS_URL='https://script.google.com/macros/s/AKfycbwKMgFmxVAj5EkG5keQtkRz_xPiW-KjqFVtAdyhmzq1uWbTR5I7dyEkRXkqamD-5TLD/exec';


 

// ── CLOCK ──

function tick(){

  const k=new Date(Date.now()+9*3600000);

  document.getElementById('clock').textContent=

    k.toISOString().slice(0,10)+'  '+k.toISOString().slice(11,19)+' KST';

}

tick();setInterval(tick,1000);


 

// ── 날짜 포맷 ──

function fmtDate(raw){

  if(!raw)return'';

  const s=String(raw).trim();

  const m=s.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);

  if(m)return`${m[1]}.${m[2].padStart(2,'0')}.${m[3].padStart(2,'0')}`;

  if(!isNaN(s)&&s.length<6){

    const d=new Date(Math.round((parseFloat(s)-25569)*86400000));

    return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');

  }

  return s.slice(0,10).replace(/-/g,'.');

}


 

// ══════════════════════════════════════════════

//  rowToEntry — 새 구조 13컬럼

//  A:기준일 B:월물 C:순번 D:WTI E:전일비 F:변동률

//  G:방향 H:코멘터리 I:변동요인리스트 J:추가정보 K:전망

// ══════════════════════════════════════════════

function rowToEntry(r){

  return{

    date:        fmtDate(r[0]),

    contract:    String(r[1]||'').trim(),

    seq:         parseInt(r[2])||1,

    wti:         parseFloat(r[3])||0,

    abs:         (r[4]!==''&&r[4]!=null)?parseFloat(r[4]):null,

    pct:         parseFloat(r[5])||0,

    direction:   String(r[6]||'').trim(),

    commentary:  String(r[7]||'').trim(),

    factors:     String(r[8]||'').trim(),   // 줄바꿈 구분 리스트

    counter:     String(r[9]||'').trim(), // 추가정보

    outlook:     String(r[10]||'').trim(),

    link:        String(r[11]||'').trim(),

  };

}


 

// ── STATE ──

let editKey=null, allEntries=[];


 

// ── LOAD ──

async function loadData(){

  document.getElementById('loading').style.display='block';

  document.getElementById('cards').innerHTML='';

  document.getElementById('empty').style.display='none';

  document.getElementById('sb-result').textContent='';

  try{

    const res=await fetch(GAS_URL+'?t='+Date.now());

    const json=await res.json();

    if(!json.success)throw new Error(json.message);

    // ★ 수정: 날짜 기준 내림차순 정렬 (최신 날짜가 앞으로)
    allEntries=(json.data||[]).slice(1)
      .map(rowToEntry)
      .filter(e=>e.date&&e.wti>0)
      .sort((a,b)=>b.date.localeCompare(a.date));

    renderAll();

  }catch(e){

    toast('❌ 로드 실패: '+e.message,'err');

    document.getElementById('empty').style.display='block';

  }finally{

    document.getElementById('loading').style.display='none';

  }

}


 

// ── 검색 ──

function doSearch(){

  const v=document.getElementById('sb-date').value;

  if(!v){clearSearch();return;}

  const fmted=fmtDate(v);

  const filtered=allEntries.filter(e=>e.date===fmted);

  renderEntries(filtered);

  document.getElementById('sb-clear').style.display='';

  document.getElementById('sb-result').textContent=

    filtered.length?`${fmted} · ${filtered.length}건`:`${fmted} — 결과 없음`;

}

function clearSearch(){

  document.getElementById('sb-date').value='';

  document.getElementById('sb-clear').style.display='none';

  document.getElementById('sb-result').textContent='';

  renderAll();

}

function renderAll(){renderEntries(allEntries);}


 

// ── 렌더 ──

function renderEntries(entries){

  if(!entries.length){

    document.getElementById('empty').style.display='block';

    document.getElementById('cards').innerHTML='';

    return;

  }

  document.getElementById('empty').style.display='none';

  const groups={};

  [...entries].forEach(e=>{

    const key=e.date+'__'+e.contract;

    if(!groups[key])groups[key]=[];

    groups[key].push(e);

  });

  Object.values(groups).forEach(g=>g.sort((a,b)=>b.seq-a.seq));

  // ★ 수정: 그룹 키도 날짜 내림차순으로 정렬 (allEntries가 이미 정렬돼 있으므로 삽입 순서 유지)
  const sortedKeys=Object.keys(groups).sort((a,b)=>{

    const dateA=a.split('__')[0]; // "2026.02.20" 형식

    const dateB=b.split('__')[0];

    return dateB.localeCompare(dateA); // 최신 날짜가 앞에

  });

  document.getElementById('cards').innerHTML=

    sortedKeys.map(k=>renderGroup(groups[k])).join('');

}


 

function renderCardBody(e, seqLabel){

  let html='';

  // 코멘터리

  if(e.commentary){

    html+=`<div class="brief-commentary">

      <div class="sec-label">📋 코멘터리${seqLabel}</div>

      <div class="co-text">${e.commentary}</div>

    </div>`;

  }

  // 변동요인 리스트

  if(e.factors){

    const lines=e.factors.split('\n').map(s=>s.replace(/^[\*\-▸·\s]+/,'').trim()).filter(Boolean);

    if(lines.length){

      html+=`<div class="brief-factors">

        <div class="sec-label">📌 변동요인 리스트${seqLabel}</div>

        <ul class="factor-list">${lines.map(l=>`<li>${l}</li>`).join('')}</ul>

      </div>`;

    }

  }

  // 추가정보

  if(e.counter){

    html+=`<div class="brief-counter">

      <div class="sec-label dim">ℹ 추가정보${seqLabel}</div>

      <div class="counter-text">${e.counter}</div>

    </div>`;

  }

  // 전망

  if(e.outlook){

    html+=`<div class="brief-outlook">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">

        <div class="sec-label blue" style="margin-bottom:0">🔭 결론 및 전망${seqLabel}</div>

        ${e.link?`<a href="${e.link}" target="_blank" style="font-family:var(--mono);font-size:12px;color:#60a5fa;border:1px solid rgba(96,165,250,.35);padding:5px 14px;border-radius:5px;text-decoration:none;letter-spacing:.08em;white-space:nowrap;flex-shrink:0;">🔗 원본 링크</a>`:''}

      </div>

      <div class="outlook-text">${e.outlook}</div>

    </div>`;

  }

  return html;

}


 

function renderGroup(group){

  const p=group[0];

  const extras=group.slice(1);

  const dir=p.pct>0?'up':p.pct<0?'dn':'flt';

  const arrow=p.pct>0?'▲':p.pct<0?'▼':'─';

  const dirTxt=p.direction||(p.pct>0?'상승':p.pct<0?'하락':'보합');

  const pctStr=(p.pct>=0?'+':'')+p.pct.toFixed(2)+'%';

  const absStr=p.abs!=null?(p.abs>=0?'+':'')+p.abs.toFixed(2)+' USD':'';

  const cardId='card-'+p.date.replace(/\./g,'-')+'-'+p.contract;

  const eJson=encodeURIComponent(JSON.stringify(p));


 

  let html=`<div class="brief dir-${dir}" id="${cardId}">

    <div class="brief-header">

      <div class="bh-date">

        <div class="bh-date-val">${p.date}</div>

        <div class="bh-date-cont">NYMEX · ${p.contract}월물</div>

      </div>

      <div class="bh-price">

        <div class="bh-arrow ${dir}">${arrow}</div>

        <div class="bh-price-block">

          <div class="bh-price-label">WTI 종가</div>

          <div class="bh-val ${dir}">${p.wti.toFixed(2)}</div>

        </div>

        <div class="bh-unit">USD<br>/ bbl</div>

      </div>

      <div class="bh-delta">

        ${absStr?`<div class="bh-d-row"><span class="bh-d-label">Δ$</span><span class="bh-d-val ${dir}">${absStr}</span></div>`:''}

        <div class="bh-d-row"><span class="bh-d-label">Δ%</span><span class="bh-d-val ${dir}">${pctStr}</span></div>

      </div>

      <div class="bh-dir">

        <div class="bh-dir-badge ${dir}">${dirTxt}</div>

        <div class="bh-dir-label">direction</div>

      </div>

      <div class="bh-actions">

        <button class="act-btn edit" onclick="openModal(JSON.parse(decodeURIComponent('${eJson}')))">✎ EDIT</button>

        <button class="act-btn del" onclick="deleteEntry('${p.date}','${p.contract}',1)">✕ DEL</button>

      </div>

    </div>

    ${renderCardBody(p,'')}

    <div class="brief-copy">

      <button class="cp-btn img" onclick="downloadImage('${cardId}','${p.date}')">⬇ 이미지</button>

      <button class="cp-btn" onclick="copyText('${cardId}')">Copy</button>

    </div>`;


 

  if(extras.length>0){

    const accId='acc-'+cardId;

    html+=`<button class="accordion-toggle" onclick="toggleAcc('${accId}')">

      <span class="at-label">+ 추가 파싱 소스 ${extras.length}개 보기</span>

      <span class="at-arrow" id="arr-${accId}">▼</span>

    </button>

    <div class="accordion-body" id="${accId}">`;

    extras.forEach(ex=>{

      const exJson=encodeURIComponent(JSON.stringify(ex));

      const exCardId=cardId+'-s'+ex.seq;

      html+=`<div class="brief sub-source" id="${exCardId}">

        <div class="source-header">

          <span class="src-badge">소스 ${ex.seq}</span>

          <div class="src-actions">

            <button class="src-act-btn edit" onclick="openModal(JSON.parse(decodeURIComponent('${exJson}')))">✎ EDIT</button>

            <button class="src-act-btn del" onclick="deleteEntry('${ex.date}','${ex.contract}',${ex.seq})">✕ DEL</button>

          </div>

        </div>

        ${renderCardBody(ex,' · 소스'+ex.seq)}

        <div class="brief-copy">

          <button class="cp-btn" onclick="copyText('${exCardId}')">Copy</button>

        </div>

      </div>`;

    });

    html+=`</div>`;

  }

  html+=`</div>`;

  return`<div class="date-group">${html}</div>`;

}


 

function toggleAcc(id){

  document.getElementById(id).classList.toggle('open');

  const arr=document.getElementById('arr-'+id);

  if(arr)arr.classList.toggle('open');

}


 

// ── MODAL ──

function openModal(entry=null){

  editKey=null;

  document.getElementById('modal-title').textContent=entry?'◈ EDIT ENTRY':'◈ NEW WTI ENTRY';

  document.getElementById('news-ta').value='';

  document.getElementById('parse-st').style.display='none';

  document.getElementById('parsed-wrap').style.display='none';

  document.getElementById('btn-save').style.display='none';

  const today=new Date(Date.now()+9*3600000).toISOString().slice(0,10);

  document.getElementById('f-date').value=today;

  document.getElementById('f-cont').value='Mar';

  ['f-wti','f-abs','f-pct','f-commentary','f-factors','f-counter','f-outlook','f-link']

    .forEach(id=>document.getElementById(id).value='');

  if(entry){

    editKey={date:entry.date,contract:entry.contract,seq:entry.seq||1};

    document.getElementById('f-wti').value      =entry.wti;

    document.getElementById('f-abs').value      =entry.abs??'';

    document.getElementById('f-pct').value      =entry.pct;

    document.getElementById('f-date').value     =entry.date.replace(/\./g,'-');

    document.getElementById('f-cont').value     =entry.contract;

    document.getElementById('f-commentary').value=entry.commentary;

    document.getElementById('f-factors').value  =entry.factors;

    document.getElementById('f-counter').value  =entry.counter;

    document.getElementById('f-outlook').value  =entry.outlook;

    document.getElementById('f-link').value      =entry.link||'';

    document.getElementById('parsed-wrap').style.display='block';

    document.getElementById('btn-save').style.display='block';

  }

  document.getElementById('overlay').classList.add('open');

}

function closeModal(){document.getElementById('overlay').classList.remove('open');}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

document.getElementById('overlay').addEventListener('click',e=>{

  if(e.target===document.getElementById('overlay'))closeModal();

});


 

// ══════════════════════════════════════════════════

//  PARSE — 섹션 번호 기반 구조적 파싱

//  1) 가격  2) 변동요인 한줄  3) 리스트  4) 전망

// ══════════════════════════════════════════════════

function doParse(){

  const raw=document.getElementById('news-ta').value.trim();

  if(!raw){

    document.getElementById('parsed-wrap').style.display='block';

    document.getElementById('btn-save').style.display='block';

    showStatus('warn','텍스트 없음 — 수동 입력 모드');return;

  }


 

  // 섹션 분리: 1) ~ 4)

  function getSection(num){

    // 1) 방식과 1. 방식 둘 다 인식
    const re=new RegExp(`${num}[).]\\s*[^\\n]*\\n([\\s\\S]*?)(?=\\n\\s*\\d+[).]|$)`);

    const m=raw.match(re);

    return m?m[1].trim():'';

  }

  const sec1=getSection(1);

  const sec2=getSection(2);

  const sec3=getSection(3);

  const sec4=getSection(4);

  const sec5=getSection(5);


 

  const f={};let m;


 

  // ══ 가격 (섹션1 우선, 전체 텍스트 fallback) ══

  const priceSource=sec1||raw;


 

  // 보고서 형식: "$65.19/b (▲ $2.86/b, +4.59%)"

  const reportLine=(priceSource.match(/\$[\d.]+\/b[^\n]*/)||[''])[0];

  const rWti=reportLine.match(/\$\s*([\d.]+)\s*\/b/);

  const rDelta=reportLine.match(/([▲▼])\s*\$\s*([\d.]+)\s*\/b/);

  const rPct=reportLine.match(/([+\-])\s*([\d.]+)%/);

  if(rWti) f.wti=parseFloat(rWti[1]);

  if(rDelta) f.abs=rDelta[1]==='▲'?parseFloat(rDelta[2]):-parseFloat(rDelta[2]);

  // 표준 프롬프트 형식: (전일대비 +$1.81/b) 또는 (전일대비 -$0.21/b)

  if(f.wti==null){
    const stdLine=(priceSource.match(/\$[\d,.]+\/b[^\n]*/)||[''])[0];
    const stdPrice=stdLine.match(/\$([\d.]+)\/b/);
    if(stdPrice)f.wti=parseFloat(stdPrice[1]);
  }

  if(f.abs==null){
    const stdChg=priceSource.match(/전일\s*대비\s*([+-])\$([\d.]+)\/b/);
    if(stdChg){f.abs=(stdChg[1]==='-'?-1:1)*parseFloat(stdChg[2]);}
    else{
      const stdChg0=priceSource.match(/전일\s*대비\s*0/);
      if(stdChg0)f.abs=0;
    }
  }


  if(rPct&&f.wti) f.pct=rPct[1]==='+'?parseFloat(rPct[2]):-parseFloat(rPct[2]);


 

  // 뉴스 기사 형식 fallback

  if(!f.wti){

    m=raw.match(/(?:급등한|급락한|상승한|하락한|오른|내린|밀린)\s*배럴당\s*([\d.]+)달러/);if(m)f.wti=parseFloat(m[1]);

  }

  if(!f.wti){

    m=raw.match(/(?:급등한|급락한|상승한|하락한|오른|내린|밀린)\s*([\d.]+)달러에\s*(?:거래|마감|체결|마쳤)/);if(m)f.wti=parseFloat(m[1]);

  }

  if(!f.wti){

    m=raw.match(/배럴당\s*([\d.]+)달러에\s*(?:거래|마감|체결|장을\s*마쳤)/);if(m)f.wti=parseFloat(m[1]);

  }

  if(!f.wti){

    m=raw.match(/배럴당\s*([\d.]+)달러/);if(m)f.wti=parseFloat(m[1]);

  }

  if(f.wti&&f.abs==null){

    const ws=(raw.match(/(?:WTI|서부텍사스|텍사스산원유)[^\n。]{0,350}/)||[''])[0];

    m=(ws||raw).match(/([\d.]+)달러\(([\d.]+)%\)\s*(?:급등|상승|올라|오른)/);

    if(m){f.abs=parseFloat(m[1]);f.pct=parseFloat(m[2]);}

    if(f.abs==null){

      m=(ws||raw).match(/([\d.]+)달러\(([\d.]+)%\)\s*(?:급락|하락|내린|밀린|떨어진)/);

      if(m){f.abs=-parseFloat(m[1]);f.pct=-parseFloat(m[2]);}

    }

  }

  if(f.wti&&f.pct==null){

    m=raw.match(/([\d.]+)%\s*(?:넘게|가량)?\s*(?:폭등|급등|상승)/);if(m)f.pct=parseFloat(m[1]);

    if(f.pct==null){m=raw.match(/([\d.]+)%\s*(?:넘게|가량)?\s*(?:폭락|급락|하락)/);if(m)f.pct=-parseFloat(m[1]);}

  }

  if(!f.abs&&f.wti&&f.pct){const p=f.wti/(1+f.pct/100);f.abs=parseFloat((f.wti-p).toFixed(2));}

  // f.abs는 있는데 f.pct 없으면 자동 계산

  if(f.wti&&f.abs!=null&&f.pct==null&&(f.wti-f.abs)>0){
    f.pct=parseFloat((f.abs/(f.wti-f.abs)*100).toFixed(2));
  }



 

  // 방향 텍스트 추출

  const dirText=priceSource.match(/→\s*(상승|하락|보합)/);


 

  // 월물

  const contM=raw.match(/(3|4|5|6|7)월\s*(?:인도분|물)/)||raw.match(/M-([1-9])/);

  if(contM){const map={'3':'Mar','4':'Apr','5':'May','6':'Jun','7':'Jul'};document.getElementById('f-cont').value=map[contM[1]]||'Mar';}


 

  // ══ 날짜 파싱 ══

  let dateSet=false;

  let articleYear=null,articleMonth=null;

  // 제목줄 날짜 최우선: "제목 : WTI 종목 브리핑 (2026-02-27)" 형식

  const titleDateM=raw.match(/제목\s*:.*?\((\d{4})[-.](\d{1,2})[-.](\d{1,2})\)/);

  if(titleDateM){document.getElementById('f-date').value=`${titleDateM[1]}-${String(titleDateM[2]).padStart(2,'0')}-${String(titleDateM[3]).padStart(2,'0')}`;dateSet=true;}


  const ymM=raw.match(/(\d{4})[년.\-\/]\s*(\d{1,2})[월.\-\/]/);

  if(ymM){articleYear=parseInt(ymM[1]);articleMonth=parseInt(ymM[2]);}


 

  const tradeDayM=raw.match(/(\d{1,2})일\s+(?:소폭\s*)?(?:하락|상승|마감|거래|체결|폭등|급등|급락)/);

  if(tradeDayM&&articleYear&&articleMonth){

    document.getElementById('f-date').value=

      `${articleYear}-${String(articleMonth).padStart(2,'0')}-${String(parseInt(tradeDayM[1])).padStart(2,'0')}`;

    dateSet=true;

  }

  if(!dateSet){

    const localM=raw.match(/현지시각?\s*(\d{1,2})일/)||raw.match(/(\d{1,2})일\s*\(현지시간\)/);

    if(localM){

      const kst=new Date(Date.now()+9*3600000);

      const yr=articleYear||kst.getFullYear(), mo=articleMonth||kst.getMonth()+1;

      let day=parseInt(localM[1])+1;

      const maxDay=new Date(yr,mo,0).getDate();

      let fmo=mo,fyr=yr;

      if(day>maxDay){day=1;fmo=mo%12+1;if(fmo===1)fyr++;}

      document.getElementById('f-date').value=`${fyr}-${String(fmo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

      dateSet=true;

    }

  }

  if(!dateSet){

    const fullDM=raw.match(/(\d{4})[년.\-\/]\s*(\d{1,2})[월.\-\/]\s*(\d{1,2})[일]?/);

    if(fullDM){document.getElementById('f-date').value=`${fullDM[1]}-${fullDM[2].padStart(2,'0')}-${fullDM[3].padStart(2,'0')}`;dateSet=true;}

  }

  if(!dateSet){

    const yesterday=new Date(Date.now()+9*3600000-86400000);

    document.getElementById('f-date').value=yesterday.toISOString().slice(0,10);

  }


 

  // ══ 섹션 2: 코멘터리 ══

  const commentary=extractSectionText(sec2, true);


 

  // ══ 섹션 3: 변동요인 리스트 ══

  const factorLines=sec3.split('\n')

    .map(s=>s.replace(/^[\*\-▸·\s]+/,'').trim())

    .filter(Boolean);

  const factors=factorLines.join('\n');


 

  // ══ 섹션 4: 전망 ══

  const outlook=extractSectionText(sec4);

  // ══ 섹션 5: 추가정보 ══

  const additional=extractSectionText(sec5);


 

  // 필드 세팅

  if(f.wti) document.getElementById('f-wti').value=f.wti.toFixed(2);

  if(f.abs!=null) document.getElementById('f-abs').value=f.abs.toFixed(2);

  if(f.pct!=null) document.getElementById('f-pct').value=f.pct.toFixed(2);

  if(commentary) document.getElementById('f-commentary').value=commentary;

  if(factors)    document.getElementById('f-factors').value=factors;

  document.getElementById('f-counter').value=additional||'';

  document.getElementById('f-outlook').value=outlook||'';

  // 디버그: 파싱 결과 확인

  console.log('[PARSE] sec4:', sec4, '| outlook:', outlook);


 

  document.getElementById('parsed-wrap').style.display='block';

  document.getElementById('btn-save').style.display='block';


 

  const ok=f.wti&&f.pct!=null;

  const bits=[];

  if(ok) bits.push(`✓ WTI $${f.wti.toFixed(2)} (${f.pct>=0?'+':''}${f.pct.toFixed(2)}%)`);

  if(commentary) bits.push('코멘터리');

  if(factorLines.length) bits.push(`변동요인 ${factorLines.length}개`);

  if(additional) bits.push('추가정보');

  if(outlook) bits.push('전망');

  showStatus(ok?'ok':'warn', bits.length?bits.join(' · '):'수동 입력 필요');

}


 

// 섹션 텍스트 정리
function extractSectionText(sec, singleLine=false){

  if(!sec)return'';

  const lines=sec.split('\n')
    .map(s=>s.replace(/^[\*\-▸·\s]+/,'').trim())
    .filter(Boolean);

  if(!lines.length)return'';

  return singleLine ? lines[0] : lines.join('\n');

}


 

function showStatus(t,msg){

  const el=document.getElementById('parse-st');

  el.style.display='block';el.className=`parse-status ${t}`;el.textContent=msg;

}

function autoPct(){

  const wti=parseFloat(document.getElementById('f-wti').value);

  const abs=parseFloat(document.getElementById('f-abs').value);

  if(wti&&!isNaN(abs)&&wti-abs>0) document.getElementById('f-pct').value=(abs/(wti-abs)*100).toFixed(2);

}


 

// ── SAVE ──

// ── base64 인코딩 (GET 파라미터용) ──
function toB64(obj){
  const str=JSON.stringify(obj);
  const arr=new TextEncoder().encode(str);
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
  let b64='';
  for(let i=0;i<arr.length;i+=3){
    const a=arr[i],b=arr[i+1]??0,c=arr[i+2]??0;
    b64+=chars[a>>2]+chars[((a&3)<<4)|(b>>4)]+
      (i+1<arr.length?chars[((b&15)<<2)|(c>>6)]:'=')+
      (i+2<arr.length?chars[c&63]:'=');
  }
  return b64;
}

// ── GET + base64 방식으로 GAS 호출 (CORS 우회) ──
async function gasGet(params){
  const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  const res=await fetch(GAS_URL+'?'+qs);
  return res.json();
}

async function doSave(){

  const wti=parseFloat(document.getElementById('f-wti').value);

  const pct=parseFloat(document.getElementById('f-pct').value);

  const dateRaw=document.getElementById('f-date').value;

  if(!dateRaw||isNaN(wti)||isNaN(pct)){showStatus('err','기준일, WTI 종가, 변동률은 필수입니다.');return;}

  const date=fmtDate(dateRaw);

  const abs=parseFloat(document.getElementById('f-abs').value)||null;

  const cont=document.getElementById('f-cont').value;

  const direction=pct>0?'상승':pct<0?'하락':'보합';

  const data={

    date, contract:cont, wti, abs:abs!==null?abs:'', pct, direction,

    commentary: document.getElementById('f-commentary').value.trim(),

    factors:    document.getElementById('f-factors').value.trim(),

    counter:    document.getElementById('f-counter').value.trim(),

    outlook:    document.getElementById('f-outlook').value.trim(),

    link:       document.getElementById('f-link').value.trim(),

  };

  const btn=document.getElementById('btn-save');

  btn.textContent='저장 중...';btn.disabled=true;

  try{

    // GET + base64 payload 방식 (CORS 우회)
    const action=editKey?'edit':'save';
    const payload={action, rowKey:editKey||null, data};
    const r=await gasGet({action, p:toB64(payload)});

    if(r.success){toast('✅ '+r.message,'ok');closeModal();await loadData();}

    else toast('❌ '+r.message,'err');

  }catch(e){toast('❌ 오류: '+e.message,'err');}

  finally{btn.textContent='▶ 구글시트 저장';btn.disabled=false;}

}


 

// ── DELETE ──

async function deleteEntry(date,contract,seq){

  if(!confirm(`${date} ${contract} 소스${seq} 항목을 삭제하시겠습니까?`))return;

  try{

    // GET + base64 방식
    const r=await gasGet({action:'delete',p:toB64({action:'delete',rowKey:{date,contract,seq}})});

    if(r.success){toast('🗑 '+r.message,'ok');await loadData();}

    else toast('❌ '+r.message,'err');

  }catch(e){toast('❌ 오류: '+e.message,'err');}

}


 

// ── COPY ──

function copyText(cardId){

  const el=document.querySelector(`#${cardId} .co-text`);

  if(!el)return;

  navigator.clipboard.writeText(el.textContent.trim()).then(()=>{

    const btn=document.querySelector(`#${cardId} .cp-btn:not(.img)`);

    if(btn){btn.classList.add('ok');btn.textContent='✓ Copied';

      setTimeout(()=>{btn.classList.remove('ok');btn.textContent='Copy';},1800);}

  });

}


 

// ── IMAGE ──

async function downloadImage(cardId,date){

  const el=document.getElementById(cardId);if(!el)return;

  const btn=el.querySelector('.cp-btn.img');

  if(btn){btn.textContent='캡처 중...';btn.disabled=true;}

  try{

    const canvas=await html2canvas(el,{backgroundColor:'#1a1d25',scale:2,useCORS:true,logging:false});

    const a=document.createElement('a');

    a.download=`WTI_${date}.png`;a.href=canvas.toDataURL('image/png');a.click();

    toast('✅ 이미지 저장됨','ok');

  }catch(e){toast('❌ 이미지 오류: '+e.message,'err');}

  finally{if(btn){btn.textContent='⬇ 이미지';btn.disabled=false;}}

}


 

// ── TOAST ──

function toast(msg,type='inf',ms=3200){

  const t=document.getElementById('toast');

  t.textContent=msg;t.className=`show ${type}`;

  clearTimeout(t._t);t._t=setTimeout(()=>t.className='',ms);

}


 

loadData();
